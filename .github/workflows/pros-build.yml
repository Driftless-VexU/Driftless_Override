name: PROS Build Check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install PROS CLI
        working-directory: Driftless_Override_PROS
        run: |
          pip install pros-cli

      - name: Install ARM toolchain
        working-directory: Driftless_Override_PROS
        run: |
          sudo apt-get update
          wget https://developer.arm.com/-/media/Files/downloads/gnu/13.2.rel1/binrel/arm-gnu-toolchain-13.2.rel1-x86_64-arm-none-eabi.tar.xz
          tar -xf arm-gnu-toolchain-13.2.rel1-x86_64-arm-none-eabi.tar.xz
          echo "$PWD/arm-gnu-toolchain-13.2.rel1-x86_64-arm-none-eabi/bin" >> $GITHUB_PATH

      - name: Verify compiler
        working-directory: Driftless_Override_PROS
        run: arm-none-eabi-g++ --version

      - name: Verify PROS install
        working-directory: Driftless_Override_PROS
        run: pros --version

      - name: Build project
        working-directory: Driftless_Override_PROS
        run: |
          pros make
